include:
  project: rationai/digital-pathology/templates/ci-templates
  file:
    - Kaniko.gitlab-ci.yml

build-image:
  extends:
    - .kaniko-build
  variables:
    DOCKERFILE_PATH: $CI_PROJECT_DIR/deployment/Dockerfile
    CI_REGISTRY_IMAGE: $CI_REGISTRY/rationai/test_deploy
  rules:
    - if: "$CI_COMMIT_TAG"
    - when: manual
