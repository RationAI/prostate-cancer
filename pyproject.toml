[project]
name = "prostate-cancer"
version = "0.1.0"
authors = [
    { name = "Jozef Kraus", email = "jozefkraus@mail.muni.cz" },
    { name = "Adam Džadoň", email = "524839@mail.muni.cz" },
    { name = "Vít Musil", email = "vit.musil@mail.muni.cz" },
    { name = "Michal Jakubík", email = "jakubik@mail.muni.cz" },
    { name = "Matej Gallo", email = "gallo.matej@mail.muni.cz" },
]
requires-python = ">=3.11,<3.13"
readme = "README.md"
license = { file = "LICENSE" }
dependencies = [
    "lightning==2.5.1.post0",
    "albumentations==2.0.8",
    "pandas==2.2.3",
    "torch==2.7.0",
    "torchvision==0.22.0",
    "triton==3.3.0", 
    "tqdm==4.67.1",
    "rationai-masks @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/masks.git@1bcaf1054011a6280870edc53fb6a8d1f995cdec",
    "rationai-mlkit @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/mlkit.git@233ead782353b3f23eee75702576f5c004cf300e",
    "rationai-tiling @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/tiling.git@9096ada81542c172908dff5b2766cf729786471b",
    "rationai-staining @ git+https://gitlab.ics.muni.cz/rationai/digital-pathology/libraries/staining.git@feature/transforms",
    "numpy==2.2.5",
    "timm==1.0.15",
    "matplotlib==3.10.1",
    "scikit-learn==1.6.1",
    "openpyxl==3.1.5",
    "mlflow==2.21.3",
    "deprecated",
]

[tool.pdm.scripts]
fit = "python -m prostate_cancer mode=fit"
validate = "python -m prostate_cancer mode=validate"
test = "python -m prostate_cancer mode=test"
predict = "python -m prostate_cancer mode=predict"
l = { composite = ["lint", "format", "mypy"] }
lint = "ruff check --fix"
format = "ruff format"
mypy = "mypy ."
post_install = { composite = [
    "pre-commit autoupdate",
    "pre-commit install",
    "pre-commit install --hook-type commit-msg",
] }

[tool.pdm]
distribution = false

[dependency-groups]
dev = [
    "mypy",
    "pre-commit",
    "ruff",
    "ipykernel>=6.29.5",
]
