# @package _global_

defaults:
  - /data/embeddings_datamodule@data
  - /model/pgp_model@model
  - _self_

checkpoint: null

trainer:
  enable_checkpointing: True
  max_epochs: 20
  log_every_n_steps: 5
  val_check_interval: 0.25
  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      save_top_k: 3
      monitor: validation/AUC
      mode: max
    - _target_: lightning.pytorch.callbacks.EarlyStopping
      monitor: validation/AUC
      mode: max
      patience: 8

data:
  batch_size: 128
  num_workers: 8

model:
  lr: 1e-4

metadata:
  experiment_name: Prostate
  run_name: Gigapath Classifier Training
  description: Gigapath Classifier Training
  hyperparams:
    batch_size: ${data.batch_size}
    num_workers: ${data.num_workers}
    lr: ${model.lr}
    carcinoma_t: ${carcinoma_roi_t}
