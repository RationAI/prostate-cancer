# @package _global_
defaults:
  - /callbacks/train@callbacks
  - _self_

carcinoma_roi_t: ${train_data.thresholds.carcinoma_roi_t}
mean: ${train_data.mean}
std: ${train_data.std}
stains: ${train_data.stains}

trainer:
  enable_checkpointing: True
  max_epochs: 50
  log_every_n_steps: 5
  val_check_interval: 0.25

checkpoint: null

model_name: ???
data_name: ${train_data.data_name}

datamodule:
  batch_size: ???
  num_workers: ???
  train:
    uris:
      - ${train_data.tiles_filtered_uri_224}
  val:
    uris:
      - ${val_data.tiles_filtered_uri_224}

model:
  lr: 1e-4
  tl_threshold: 0.5

use_case: "Training"
