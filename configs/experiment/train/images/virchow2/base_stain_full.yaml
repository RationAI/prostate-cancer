# @package _global_

defaults:
  - /experiment/train/images/virchow2/base_stain
  - _self_

model_name: "Virchow2 (Stain)"

model:
  freeze_backbone: False
  backbone_lr: 1e-5
  warmup_steps: 200

trainer:
  gradient_clip_val: 1.0

# full fine-tuning requires more memory
datamodule:
  batch_size: 16
  num_workers: 8
