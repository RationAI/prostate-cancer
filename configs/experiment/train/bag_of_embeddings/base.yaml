# @package _global_

defaults:
  - /experiment/train/base
  - /data/mmci/tl_train@train_data
  - /data/mmci/tl_val@val_data
  - _self_

model:
  sl_threshold: 0.5

callbacks:
  checkpointing:
    monitor: validation/loss
    mode: min
  early_stopping:
    monitor: validation/loss
    mode: min

datamodule:
  batch_size: 4
  num_workers: 8
